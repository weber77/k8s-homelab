apiVersion: v1
kind: Pod
metadata:
  name: affinity-pod
spec:
  containers:
    - name: affinity-container
      image: nginx
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "topology.kubernetes.io/region"
                operator: In
                values:
                  - "chh-dk-2"
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          preference:
            matchExpressions:
              - key: "disktype"
                operator: In
                values:
                  - "ssd"
