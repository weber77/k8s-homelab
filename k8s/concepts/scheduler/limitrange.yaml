apiVersion: v1
kind: LimitRange
metadata:
  name: example-limitrange
  namespace: example-namespace
spec:
  limits:
    - type: Pod
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: "200m"
        memory: "200Mi"
    - type: Container
      default:
        cpu: "100m"
        memory: "100Mi"
      defaultRequest:
        cpu: "100m"
        memory: "100Mi"
      max:
        cpu: "1"
        memory: "1Gi"
      min:
        cpu: "100m"
        memory: "100Mi"
